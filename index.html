
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Belajar Danbo - JSON Version</title>
  <style>
    /* CSS tetap sama seperti sebelumnya agar tampilan tidak berubah */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #eef7ff; min-height: 100vh; }
    .home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .chopper { width: 150px; border-radius: 20px; margin-bottom: 20px; }
    .folders { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: min(800px, 100%); padding: 20px; }
    .folder { background: #ffd54f; border-radius: 15px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
    .viewer-page { display: none; height: 100vh; grid-template-columns: 320px 1fr; }
    .sidebar { background: #fff8e1; padding: 20px; border-right: 2px solid #ffd54f; overflow-y: auto; }
    .back-btn { padding: 12px; background: #1f3b5b; color: white; border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    .file-item { padding: 12px; background: white; margin-bottom: 8px; border-radius: 8px; cursor: pointer; font-size: 14px; border: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
    .file-item.active { background: #1f3b5b; color: white; }
    .content-area { background: #f4f4f4; overflow-y: auto; display: flex; justify-content: center; padding: 20px; width: 100%; }
    .quiz-container { background: white; width: min(800px, 100%); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .question { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .option-label { padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .btn-selesai { background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    .feedback { font-weight: bold; display: block; margin-top: 5px; }
    .correct { color: #28a745; }
    .wrong { color: #dc3545; }
    @media (max-width: 768px) { .viewer-page { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } .sidebar { max-height: 200px; } .options { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="home" class="home">
    <img class="chopper" src="https://media.giphy.com/media/3nYPJOsVt5RYnpPv3o/giphy.gif">
    <h1>Portal Belajar Danbo</h1>
    <div class="folders">
      <div class="folder" onclick="openLevel('n1')"><h2>JLPT N1</h2></div>
      <div class="folder" onclick="openLevel('n2')"><h2>JLPT N2</h2></div>
      <div class="folder" onclick="openLevel('n3')"><h2>JLPT N3</h2></div>
    </div>
  </div>

  <div id="viewerPage" class="viewer-page">
    <div class="sidebar">
      <div class="back-btn" onclick="goHome()">← Kembali</div>
      <h2 id="levelTitle">Materi</h2>
      <div id="fileList"></div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>

  <script>
    const GH_USER = "mh7714240-jpg";
    const GH_REPO = "aries.github.io";

    const contentData = {
      n1: [
        { type: 'quiz', id: 'tes-2024-12', title: 'Tes 2024 Bulan 12 N1', icon: '📝' },
        { type: 'quiz', id: 'tes-2010', title: 'Simulasi Tes 2010', icon: '📝' },
        { type: 'pdf', file: 'jlpt-n1-2024-12.pdf', title: 'PDF N1 2024-12', icon: '📄' }
      ],
      n2: [], n3: []
    };

    let currentQuizData = null;

    async function openLevel(level) {
      document.getElementById('home').style.display = 'none';
      document.getElementById('viewerPage').style.display = 'grid';
      document.getElementById('levelTitle').textContent = 'Materi ' + level.toUpperCase();

      const listDiv = document.getElementById('fileList');
      listDiv.innerHTML = '';

      // Load file JSON data untuk level ini
      try {
        const response = await fetch(`assets/${level}/${level}-data.json`);
        currentQuizData = await response.json();
      } catch (e) {
        console.log("Belum ada file JSON untuk level ini");
      }

      contentData[level].forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `<span class="icon-type">${item.icon}</span> <span>${item.title}</span>`;
        div.onclick = function() {
          if(item.type === 'pdf') loadPDF(level, item.file, this);
          else displayQuiz(item.id, this);
        };
        listDiv.appendChild(div);
        if (index === 0) div.click();
      });
    }

    function loadPDF(level, fileName, element) {
      setActive(element);
      const fileUrl = `https://${GH_USER}.github.io/${GH_REPO}/assets/${level}/${fileName}`;
      const finalUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(fileUrl)}&embedded=true`;
      document.getElementById('contentArea').innerHTML = `<iframe style="width:100%;height:100%;border:none;" src="${finalUrl}"></iframe>`;
    }

    function displayQuiz(quizId, element) {
      setActive(element);
      if (!currentQuizData || !currentQuizData[quizId]) {
        document.getElementById('contentArea').innerHTML = "<p>Data kuis tidak ditemukan.</p>";
        return;
      }

      const data = currentQuizData[quizId];
      let html = `<div class="quiz-container"><h2>${data.title}</h2><form id="quizForm">`;
      
      data.questions.forEach((qObj, i) => {
        html += `
          <div class="question">
            <p>${qObj.q} <span id="feedback-${i}" class="feedback"></span></p>
            <div class="options">
              ${qObj.options.map((opt, idx) => `
                <label class="option-label">
                  <input type="radio" name="q${i}" value="${idx}"> ${opt}
                </label>
              `).join('')}
            </div>
          </div>`;
      });

      html += `<button type="button" class="btn-selesai" onclick="checkAnswers('${quizId}')">SELESAI</button></form></div>`;
      document.getElementById('contentArea').innerHTML = html;
    }

    function checkAnswers(quizId) {
      const questions = currentQuizData[quizId].questions;
      questions.forEach((qObj, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const feedback = document.getElementById(`feedback-${i}`);
        if (selected && parseInt(selected.value) === qObj.correct) {
          feedback.innerHTML = "✅ Benar!"; feedback.className = "feedback correct";
        } else {
          feedback.innerHTML = `❌ Salah! (Benar: ${qObj.options[qObj.correct]})`; feedback.className = "feedback wrong";
        }
      });
    }

    function setActive(el) {
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }

    function goHome() {
      document.getElementById('viewerPage').style.display = 'none';
      document.getElementById('home').style.display = 'flex';
    }
  </script>
</body>
</html>
