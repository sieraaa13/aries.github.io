<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danbo JLPT Mastery</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --error: #e74c3c; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: var(--primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen { display: none; padding: 20px; overflow-y: auto; flex: 1; text-align: center; }
        .active-screen { display: block; }

        .login-box { background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; margin-top: 50px; }
        input { padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #ddd; width: 280px; margin-bottom: 15px; outline: none; }
        
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; max-width: 800px; margin: 30px auto; }
        .folder-card { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .folder-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .exam-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .question-card { background: var(--white); padding: 25px; margin-bottom: 20px; border-radius: 12px; text-align: left; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .q-image { display: block; max-width: 100%; height: auto; margin: 0 auto 15px; border: 1px solid #eee; border-radius: 8px; }
        
        .option-item { padding: 12px 15px; border: 2px solid #eee; border-radius: 8px; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .option-item.selected { border-color: var(--accent); background: #ebf5ff; }
        .option-item.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .option-item.wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .btn-main { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Sidebar Danbo */
        #chat-icon { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: white; border-radius: 50%; border: 3px solid var(--accent); cursor: pointer; z-index: 100; overflow: hidden; }
        #chat-sidebar { position: fixed; right: -350px; top: 0; width: 320px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1001; display: flex; flex-direction: column; }
        #chat-sidebar.open { right: 0; }
        .chat-header { background: var(--primary); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #danbo-msg { padding: 15px; flex: 1; overflow-y: auto; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active-screen">
        <div class="login-box">
            <img src="assets/icon robot.jpeg" width="80" style="border-radius: 50%;" onerror="this.src='https://via.placeholder.com/80'">
            <h2>Halo! Aku Danbo</h2>
            <p>Siapa nama kamu?</p>
            <input type="text" id="user-input-name" placeholder="Ketik nama di sini..." autofocus>
            <br>
            <button class="btn-main" onclick="app.login()">Masuk</button>
        </div>
    </div>

    <div id="screen-levels" class="screen">
        <h2 id="welcome-text">Pilih Level JLPT</h2>
        <div class="folder-grid">
            <div class="folder-card" onclick="app.selectLevel('n3')">📁<br><br><b>Level N3</b></div>
        </div>
    </div>

    <div id="screen-years" class="screen">
        <button onclick="app.nav('screen-levels')">⬅ Kembali</button>
        <h2 id="level-display"></h2>
        <div class="folder-grid" id="year-container"></div>
    </div>

    <div id="screen-files" class="screen">
        <button onclick="app.nav('screen-years')">⬅ Kembali</button>
        <h2>Pilih Periode Ujian</h2>
        <div class="folder-grid">
            <div class="folder-card" onclick="app.loadExam('07')">📄<br><br><b>Juli (07)</b></div>
            <div class="folder-card" onclick="app.loadExam('12')">📄<br><br><b>Desember (12)</b></div>
        </div>
    </div>

    <div id="screen-exam" class="screen">
        <div class="exam-container">
            <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                <button onclick="location.reload()">Keluar</button>
                <b id="progress-indicator"></b>
            </div>
            <div id="questions-list"></div>
            <button id="btn-submit" class="btn-main" style="background:var(--success); width:100%; margin:30px 0;" onclick="app.finishExam()">Selesai & Analisis</button>
            
            <div id="result-box" style="display:none; margin-top:30px; background: white; padding: 20px; border-radius: 15px;">
                <h2 id="score-text"></h2>
                <div style="max-width:450px; margin: 0 auto;"><canvas id="resultChart"></canvas></div>
                <div id="result-details" style="text-align: left; margin-top: 20px; font-size: 14px;"></div>
                <button class="btn-main" style="margin-top:20px;" onclick="location.reload()">Kembali ke Menu</button>
            </div>
        </div>
    </div>

    <div id="chat-icon" onclick="app.toggleChat(true)"><img src="assets/icon robot.jpeg" width="100%" onerror="this.src='https://via.placeholder.com/60'"></div>
    <div id="chat-sidebar">
        <div class="chat-header"><span>Danbo AI Assistant</span><span onclick="app.toggleChat(false)" style="cursor:pointer">✕</span></div>
        <div id="danbo-msg">Halo! Aku Danbo. Silakan login untuk mulai belajar bersama.</div>
    </div>

    <script>
        const app = {
            userName: 'Kamu',
            level: '',
            year: '',
            month: '',
            data: [],
            answers: [],
            isFinished: false,

            nav: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
                document.getElementById(id).classList.add('active-screen');
            },

            login: () => {
                const name = document.getElementById('user-input-name').value;
                if(name) app.userName = name;
                document.getElementById('welcome-text').innerText = `Halo, ${app.userName}! Pilih level:`;
                app.toggleChat(true);
                app.updateDanbo(`Selamat datang, <b>${app.userName}</b>! Aku sudah siap membantumu belajar. Pilih level JLPT yang ingin kamu kerjakan hari ini.`);
                app.nav('screen-levels');
            },

            selectLevel: (lvl) => {
                app.level = lvl;
                document.getElementById('level-display').innerText = `Arsip ${lvl.toUpperCase()}`;
                const years = ['2011','2012','2013','2014','2015','2016','2017','2018','2019','2020','2021','2022','2023'];
                const container = document.getElementById('year-container');
                container.innerHTML = years.map(y => `<div class="folder-card" onclick="app.selectYear('${y}')">📁<br><br><b>${y}</b></div>`).join('');
                app.nav('screen-years');
            },

            selectYear: (y) => {
                app.year = y;
                app.nav('screen-files');
            },

            getImage: (qText) => {
                const numMatch = qText.match(/^(\d+)\./);
                if(!numMatch) return null;
                const n = parseInt(numMatch[1]);
                
                // Mapping file sesuai struktur GitHub (19-23, 24, 25, 26, 27, 28-30, dst)
                if(n >= 19 && n <= 23) return "19-23.png";
                if(n >= 24 && n <= 27) return `${n}.png`;
                if(n >= 28 && n <= 30) return "28-30.png";
                if(n >= 31 && n <= 33) return "31-33.png";
                if(n >= 34 && n <= 37) return "34-37.png";
                if(n >= 38 && n <= 39) return "38-39.png";
                return null;
            },

            loadExam: async (month) => {
                app.month = month;
                app.nav('screen-exam');
                const container = document.getElementById('questions-list');
                container.innerHTML = "Sedang mengambil soal...";
                
                try {
                    const path = `assets/${app.level}/${app.year}/${month}.json`;
                    const res = await fetch(path);
                    const json = await res.json();
                    
                    // Ambil key pertama (misal test_2014_07)
                    const testKey = Object.keys(json)[0];
                    app.data = json[testKey].questions;
                    app.answers = new Array(app.data.length).fill(null);
                    app.isFinished = false;
                    
                    container.innerHTML = "";
                    app.data.forEach((q, i) => {
                        let imgHtml = "";
                        const imgName = app.getImage(q.q);
                        
                        // Gambar muncul untuk nomor 19 ke atas
                        if (imgName) {
                            const imgPath = `assets/${app.level}/${app.year}/${month}/${imgName}`;
                            imgHtml = `<img src="${imgPath}" class="q-image" onerror="this.style.display='none'">`;
                        }

                        const options = q.options.map((opt, idx) => `
                            <div class="option-item" id="q${i}-o${idx}" onclick="app.pick(${i}, ${idx})">${idx+1}. ${opt}</div>
                        `).join('');

                        container.innerHTML += `
                            <div class="question-card">
                                ${imgHtml}
                                <p><b>${q.q}</b></p>
                                <div class="options-container">${options}</div>
                            </div>
                        `;
                    });
                    app.updateProgress();
                    app.updateDanbo(`Semangat, ${app.userName}! Ada ${app.data.length} soal untuk periode ini. Kerjakan dengan teliti ya.`);
                } catch (e) {
                    container.innerHTML = "Gagal memuat soal. Pastikan path <b>" + `assets/${app.level}/${app.year}/${month}.json` + "</b> benar.";
                }
            },

            pick: (qi, oi) => {
                if(app.isFinished) return;
                app.answers[qi] = oi;
                document.querySelectorAll(`[id^="q${qi}-o"]`).forEach(el => el.classList.remove('selected'));
                document.getElementById(`q${qi}-o${oi}`).classList.add('selected');
                app.updateProgress();
            },

            updateProgress: () => {
                const filled = app.answers.filter(a => a !== null).length;
                document.getElementById('progress-indicator').innerText = `Progres: ${filled}/${app.data.length}`;
            },

            finishExam: () => {
                app.isFinished = true;
                let correctCount = 0;
                
                // Kategorisasi Segi-5
                const s = { 
                    KANJI: 0, tKANJI: 0, 
                    GOI: 0, tGOI: 0, 
                    BUNPOU: 0, tBUNPOU: 0, 
                    DOKKAI: 0, tDOKKAI: 0, 
                    CHOUKAI: 0, tCHOUKAI: 0 
                };

                app.data.forEach((q, i) => {
                    const cat = q.category.split('_')[0]; // Ambil KANJI, GOI, BUNPOU, atau DOKKAI
                    const tKey = `t${cat}`;
                    if(s.hasOwnProperty(tKey)) s[tKey]++;

                    const isCorrect = app.answers[i] === q.correct;
                    document.getElementById(`q${i}-o${q.correct}`).classList.add('correct');

                    if(isCorrect) {
                        correctCount++;
                        if(s.hasOwnProperty(cat)) s[cat]++;
                    } else if(app.answers[i] !== null) {
                        document.getElementById(`q${i}-o${app.answers[i]}`).classList.add('wrong');
                    }
                });

                document.getElementById('btn-submit').style.display = 'none';
                document.getElementById('result-box').style.display = 'block';
                document.getElementById('score-text').innerText = `Skor ${app.userName}: ${correctCount} / ${app.data.length}`;
                
                // Detail teks di bawah chart
                document.getElementById('result-details').innerHTML = `
                    <b>Rincian Penilaian:</b><br>
                    - Kanji: ${s.KANJI}/${s.tKANJI}<br>
                    - Goi: ${s.GOI}/${s.tGOI}<br>
                    - Bunpou: ${s.BUNPOU}/${s.tBUNPOU}<br>
                    - Dokkai: ${s.DOKKAI}/${s.tDOKKAI}
                `;

                app.updateDanbo(`Ujian selesai, <b>${app.userName}</b>! Kamu menjawab ${correctCount} benar. Lihat diagram radar untuk melihat kekuatanmu di tiap kategori.`);
                app.showChart(s);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            showChart: (s) => {
                const ctx = document.getElementById('resultChart').getContext('2d');
                new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['Kanji', 'Goi', 'Bunpou', 'Dokkai', 'Choukai'],
                        datasets: [{
                            label: 'Persentase Penguasaan (%)',
                            data: [
                                (s.KANJI/s.tKANJI)*100 || 0,
                                (s.GOI/s.tGOI)*100 || 0,
                                (s.BUNPOU/s.tBUNPOU)*100 || 0,
                                (s.DOKKAI/s.tDOKKAI)*100 || 0,
                                (s.CHOUKAI/s.tCHOUKAI)*100 || 0
                            ],
                            backgroundColor: 'rgba(52, 152, 219, 0.2)',
                            borderColor: '#3498db',
                            pointBackgroundColor: '#2c3e50'
                        }]
                    },
                    options: { 
                        scales: { r: { min: 0, max: 100, ticks: { stepSize: 20 } } },
                        plugins: { legend: { display: false } }
                    }
                });
            },

            toggleChat: (open) => {
                document.getElementById('chat-sidebar').classList.toggle('open', open);
            },

            updateDanbo: (txt) => {
                document.getElementById('danbo-msg').innerHTML = txt;
            }
        };
    </script>
</body>
</html>
