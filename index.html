<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Belajar Bahasa Jepang</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef7ff, #ffffff);
      min-height: 100vh;
    }
    .home {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    h1 {
      color: #1f3b5b;
      margin-bottom: 24px;
      text-align: center;
    }
    .chopper {
      width: 220px;
      max-width: 80vw;
      height: auto;
      margin-bottom: 30px;
      border-radius: 16px;
    }
    .folders {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: min(900px, 100%);
    }
    .folder {
      background: #ffd54f;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.2s;
    }
    .folder:hover { transform: translateY(-4px); }

    .viewer-page {
      display: none;
      height: 100vh;
      grid-template-columns: 260px 1fr;
    }
    .sidebar {
      background: #fff8e1;
      padding: 16px;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }
    .sidebar h2 {
      margin-top: 0;
      font-size: 20px;
      color: #5d4300;
    }
    .sidebar a {
      display: block;
      margin: 8px 0;
      padding: 8px 10px;
      border-radius: 8px;
      text-decoration: none;
      color: #1f3b5b;
      background: rgba(255,255,255,0.6);
      font-size: 14px;
      word-break: break-word;
    }
    .sidebar a:hover {
      background: rgba(255,255,255,0.9);
    }
    .pdf-viewer {
      width: 100%;
      height: 100vh;
      border: none;
      background: white;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      background: #1f3b5b;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .viewer-page {
        grid-template-columns: 1fr;
        grid-template-rows: 90px 1fr;
      }
      .sidebar {
        padding: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }
      .sidebar h2 { display: none; }
      .sidebar a {
        display: inline-block;
        margin: 4px 8px 4px 0;
        padding: 6px 10px;
        font-size: 12px;
        max-width: 180px;
        vertical-align: top;
      }
      .back-btn { margin-bottom: 8px; }
      .pdf-viewer { height: calc(100vh - 90px); }
    }
  </style>
</head>
<body>
  <div id="home" class="home">
    <h1>Portal Belajar Bahasa Jepang</h1>
    <img class="chopper" src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExdzYzbnNwMDBhdTVlYmJwaWN3cWNpbGt0dXl2bmxub2s1ZWtucDliYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3nYPJOsVt5RYnpPv3o/giphy.gif" alt="Chopper gif" />

    <div class="folders">
      <div class="folder" onclick="openLevel('n1')"><h2>Bahasa Jepang N1</h2></div>
      <div class="folder" onclick="openLevel('n2')"><h2>Bahasa Jepang N2</h2></div>
      <div class="folder" onclick="openLevel('n3')"><h2>Bahasa Jepang N3</h2></div>
    </div>
  </div>

  <div id="viewerPage" class="viewer-page">
    <div class="sidebar">
      <div class="back-btn" onclick="goHome()">← Kembali</div>
      <h2 id="levelTitle">Daftar File</h2>
      <div id="fileList"></div>
    </div>
    <iframe id="pdfViewer" class="pdf-viewer"></iframe>
  </div>

  <script>
    const basePath = window.location.pathname.split('/')[1] || '';

    const files = {
      n1: [
        'jlpt-n1-2024-12.pdf',
        'jlpt-n1-2024-07.pdf',
        'jlpt-n1-2023-12.pdf',
        'jlpt-n1-2023-07.pdf',
        'jlpt-n1-2022-12.pdf'
      ],
      n2: [],
      n3: []
    };

    function openLevel(level) {
      document.getElementById('home').style.display = 'none';
      document.getElementById('viewerPage').style.display = 'grid';
      document.getElementById('levelTitle').textContent = 'Bahasa Jepang ' + level.toUpperCase();

      const fileList = document.getElementById('fileList');
      fileList.innerHTML = '';

      files[level].forEach((file) => {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = file;
        a.onclick = (e) => {
          e.preventDefault();
          loadPDF(level, file);
        };
        fileList.appendChild(a);
      });

      if (files[level].length > 0) {
        loadPDF(level, files[level][0]);
      } else {
        document.getElementById('pdfViewer').src = '';
      }
    }

    function loadPDF(level, file) {
      const pdfPath = `/${basePath}/assets/${level}/${file}`;
      document.getElementById('pdfViewer').src = pdfPath;
    }

    function goHome() {
      document.getElementById('viewerPage').style.display = 'none';
      document.getElementById('home').style.display = 'flex';
      document.getElementById('pdfViewer').src = '';
    }
  </script>
</body>
</html>
