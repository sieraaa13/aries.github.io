<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Belajar Danbo - N1</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #eef7ff; }
    .home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .folders { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; width: 80%; }
    .folder { background: #ffd54f; padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .viewer-page { display: none; height: 100vh; grid-template-columns: 300px 1fr; }
    .sidebar { background: #fff8e1; padding: 20px; border-right: 2px solid #ffd54f; overflow-y: auto; }
    .back-btn { padding: 12px; background: #1f3b5b; color: white; border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 20px; }
    .file-item { padding: 15px; background: white; margin-bottom: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #ddd; }
    .file-item.active { background: #1f3b5b; color: white; }
    .content-area { background: #f4f4f4; padding: 20px; overflow-y: auto; width: 100%; display: flex; justify-content: center; }
    .quiz-container { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 15px; }
    .question { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
    .reading-context { margin: 15px 0; border: 2px solid #1f3b5b; border-radius: 8px; }
    .reading-label { background: #1f3b5b; color: white; padding: 5px 10px; font-size: 12px; }
    .quiz-image { width: 100%; height: auto; display: block; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .option-label { padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .btn-selesai { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
    .feedback { font-weight: bold; display: block; margin-top: 5px; }
    .correct { color: #28a745; }
    .wrong { color: #dc3545; }
    @media (max-width: 768px) { .viewer-page { grid-template-columns: 1fr; } .sidebar { max-height: 200px; } }
  </style>
</head>
<body>

  <div id="home" class="home">
    <h1>Portal Belajar Danbo</h1>
    <div class="folders">
      <div class="folder" onclick="openLevel('n1')">JLPT N1</div>
      <div class="folder" onclick="openLevel('n2')">JLPT N2</div>
    </div>
  </div>

  <div id="viewerPage" class="viewer-page">
    <div class="sidebar">
      <div class="back-btn" onclick="goHome()">← KEMBALI</div>
      <div id="fileList"></div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>

  <script>
    // SESUAIKAN DENGAN STRUKTUR GITHUB KAMU
    const setup = {
      n1: { 
        path: "assets/n1/2024/12", // Jalur folder di GitHub
        jsonName: "n1-data.json",   // Nama file JSON
        quizId: "tes-2024-12" 
      }
    };

    let currentData = null;
    let currentLvl = '';

    async function openLevel(level) {
      currentLvl = level;
      const config = setup[level];
      if (!config) { alert("Data belum tersedia"); return; }

      try {
        // Memanggil: assets/n1/2024/12/n1-data.json
        const response = await fetch(`${config.path}/${config.jsonName}`);
        if (!response.ok) throw new Error("File tidak ditemukan");
        
        currentData = await response.json();
        
        document.getElementById('home').style.display = 'none';
        document.getElementById('viewerPage').style.display = 'grid';
        
        renderSidebar(config.quizId);
      } catch (err) {
        console.error(err);
        document.getElementById('fileList').innerHTML = `<p style="color:red">Gagal memuat JSON.<br>Pastikan file ada di:<br><b>${config.path}/${config.jsonName}</b></p>`;
        document.getElementById('home').style.display = 'none';
        document.getElementById('viewerPage').style.display = 'grid';
      }
    }

    function renderSidebar(quizId) {
      const list = document.getElementById('fileList');
      list.innerHTML = `<div class="file-item active" onclick="loadQuiz('${quizId}')">📝 Tes Desember 2024</div>`;
      loadQuiz(quizId);
    }

    function loadQuiz(quizId) {
      const area = document.getElementById('contentArea');
      const data = currentData[quizId];
      const config = setup[currentLvl];
      
      let html = `<div class="quiz-container"><h2>${data.title}</h2><form id="qForm">`;
      
      data.questions.forEach((q, i) => {
        html += `<div class="question"><p><b>${q.q}</b> <span id="f-${i}" class="feedback"></span></p>`;
        
        if (q.image) {
          // Menghasilkan: assets/n1/2024/12/45.png
          html += `
            <div class="reading-context">
              <div class="reading-label">GAMBAR/BACAAN</div>
              <img src="${config.path}/${q.image}" class="quiz-image">
            </div>`;
        }

        html += `<div class="options">`;
        q.options.forEach((opt, idx) => {
          html += `
            <label class="option-label">
              <input type="radio" name="q${i}" value="${idx}"> ${opt}
            </label>`;
        });
        html += `</div></div>`;
      });

      html += `<button type="button" class="btn-selesai" onclick="check('${quizId}')">CEK JAWABAN</button></form></div>`;
      area.innerHTML = html;
    }

    function check(id) {
      const qs = currentData[id].questions;
      qs.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        const fb = document.getElementById(`f-${i}`);
        if (sel && parseInt(sel.value) === q.correct) {
          fb.innerHTML = "✅ Benar"; fb.className = "feedback correct";
        } else {
          fb.innerHTML = `❌ Salah (Jawaban: ${q.options[q.correct]})`; fb.className = "feedback wrong";
        }
      });
    }

    function goHome() {
      document.getElementById('home').style.display = 'flex';
      document.getElementById('viewerPage').style.display = 'none';
    }
  </script>
</body>
</html>
