<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danbo JLPT Mastery</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --error: #e74c3c; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--primary); }
        .screen { display: none; padding: 20px; text-align: center; }
        .active-screen { display: block; }
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; max-width: 800px; margin: 30px auto; }
        .folder-card { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .question-card { background: var(--white); padding: 25px; margin-bottom: 20px; border-radius: 12px; text-align: left; box-shadow: 0 2px 8px rgba(0,0,0,0.06); max-width: 800px; margin-left: auto; margin-right: auto; }
        .q-image { display: block; max-width: 100%; height: auto; margin: 0 auto 15px; border: 1px solid #ccc; }
        .option-item { padding: 12px 15px; border: 2px solid #eee; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        .option-item.selected { border-color: var(--accent); background: #ebf5ff; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active-screen">
        <div style="margin-top: 100px;">
            <h2>Selamat Datang</h2>
            <input type="text" id="user-name" placeholder="Masukkan Nama Kamu..." style="padding:10px; width:250px; border-radius:8px; border:1px solid #ccc;">
            <button class="btn-main" onclick="app.login()">Masuk</button>
        </div>
    </div>

    <div id="screen-levels" class="screen">
        <h2 id="welcome-text">Pusat Materi JLPT</h2>
        <div class="folder-grid">
            <div class="folder-card" onclick="app.selectLevel('n3')">📁<br><br><b>Level N3</b></div>
        </div>
    </div>

    <div id="screen-years" class="screen">
        <button onclick="app.nav('screen-levels')">⬅ Kembali</button>
        <h2>Pilih Tahun</h2>
        <div class="folder-grid" id="year-container"></div>
    </div>

    <div id="screen-exam" class="screen">
        <div style="max-width:800px; margin:auto; display:flex; justify-content:space-between;">
            <button onclick="location.reload()">Keluar</button>
            <b id="progress"></b>
        </div>
        <div id="questions-list" style="margin-top:20px;"></div>
        <button id="btn-submit" class="btn-main" style="background:var(--success); margin:40px;" onclick="app.finish()">Selesai & Analisis</button>
    </div>

    <script>
        const app = {
            user: 'Kamu',
            level: '',
            year: '',
            questions: [],
            answers: [],

            nav: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
                document.getElementById(id).classList.add('active-screen');
            },

            login: () => {
                const n = document.getElementById('user-name').value;
                if(n) app.user = n;
                document.getElementById('welcome-text').innerText = `Halo, ${app.user}! Selamat belajar.`;
                app.nav('screen-levels');
            },

            selectLevel: (lvl) => {
                app.level = lvl;
                const years = ['2011','2012','2013','2014','2015']; // Sesuaikan dengan folder kamu
                document.getElementById('year-container').innerHTML = years.map(y => `
                    <div class="folder-card" onclick="app.loadExam('${y}', '07')">📄<br><br><b>${y} (Juli)</b></div>
                `).join('');
                app.nav('screen-years');
            },

            getImage: (qText) => {
                const match = qText.match(/^(\d+)\./);
                if(!match) return null;
                const n = parseInt(match[1]);
                if(n >= 19 && n <= 23) return "19-23.png";
                if(n >= 24 && n <= 27) return `${n}.png`;
                if(n >= 28 && n <= 30) return "28-30.png";
                if(n >= 31 && n <= 33) return "31-33.png";
                if(n >= 34 && n <= 37) return "34-37.png";
                if(n >= 38 && n <= 39) return "38-39.png";
                return null;
            },

            loadExam: async (yr, mo) => {
                app.year = yr;
                app.nav('screen-exam');
                const container = document.getElementById('questions-list');
                container.innerHTML = "Memuat soal...";

                try {
                    // BERDASARKAN GITHUB KAMU: JSON ada di assets/n3/2011/07.json
                    const url = `assets/${app.level}/${yr}/${mo}.json`;
                    const res = await fetch(url);
                    const json = await res.json();
                    
                    // Ambil array questions
                    const key = Object.keys(json)[0];
                    app.questions = json[key].questions;
                    app.answers = new Array(app.questions.length).fill(null);
                    
                    container.innerHTML = "";
                    let isDokkai = false;

                    app.questions.forEach((q, i) => {
                        // Jika nomor soal mulai dari 1 lagi di tengah, itu Dokkai
                        if(i > 0 && q.q.startsWith("1.")) isDokkai = true;

                        let imgHtml = "";
                        const imgName = app.getImage(q.q);
                        
                        // Gambar ada di subfolder: assets/n3/2011/07/19-23.png
                        if(imgName) {
                            imgHtml = `<img src="assets/${app.level}/${yr}/${mo}/${imgName}" class="q-image" onerror="this.style.display='none'">`;
                        }

                        container.innerHTML += `
                            <div class="question-card">
                                ${imgHtml}
                                <p><b>${q.q}</b></p>
                                ${q.options.map((o, idx) => `
                                    <div class="option-item" id="q${i}-o${idx}" onclick="app.pick(${i},${idx})">${idx+1}. ${o}</div>
                                `).join('')}
                            </div>
                        `;
                    });
                } catch (e) {
                    container.innerHTML = `Gagal memuat. Cek file di: assets/${app.level}/${yr}/${mo}.json`;
                }
            },

            pick: (qi, oi) => {
                app.answers[qi] = oi;
                document.querySelectorAll(`[id^="q${qi}-o"]`).forEach(el => el.classList.remove('selected'));
                document.getElementById(`q${qi}-o${oi}`).classList.add('selected');
            },

            finish: () => {
                let score = 0;
                app.questions.forEach((q, i) => {
                    if(app.answers[i] === q.correct) score++;
                });
                alert(`Ujian Selesai, ${app.user}!\nSkor kamu: ${score}/${app.questions.length}`);
                location.reload();
            }
        };
    </script>
</body>
</html>
