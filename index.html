<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Mastery - Danbo AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Gaya CSS tetap sama seperti sebelumnya dengan tambahan login screen */
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --error: #e74c3c; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #login-screen, #folder-screen, #year-screen, #file-screen { padding: 40px; text-align: center; overflow-y: auto; height: 100%; }
        .input-user { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; width: 250px; margin-bottom: 10px; }
        .btn-start { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        /* ... Gaya lainnya tetap sama ... */
        .question-card { background: var(--white); padding: 25px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
        .q-image { display: block; max-width: 100%; height: auto; margin: 0 auto 15px; border: 1px solid #ddd; }
        .option-item { padding: 14px 18px; border: 2px solid #eaeeef; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .option-item.selected { background: #e3f2fd; border-color: var(--accent); }
        .option-item.correct { background: var(--success) !important; color: white; }
        .option-item.wrong { background: var(--error) !important; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Selamat Datang di Danbo AI</h1>
        <p>Silakan masukkan nama kamu untuk mulai belajar</p>
        <input type="text" id="username-input" class="input-user" placeholder="Nama User..."><br>
        <button class="btn-start" onclick="loginUser()">Mulai Ujian</button>
    </div>

    <div id="folder-screen" class="hidden">
        <h2 id="welcome-msg"></h2>
        <div class="folder-grid">
            <div class="folder-card" onclick="selectLevel('n3')">📁<br><br><b>Level N3</b></div>
        </div>
    </div>

    <div id="year-screen" class="hidden">
        <button onclick="navTo('folder-screen')">⬅ Kembali</button>
        <div class="folder-grid" id="year-list"></div>
    </div>

    <div id="file-screen" class="hidden">
        <button onclick="navTo('year-screen')">⬅ Kembali</button>
        <div class="file-list" id="file-list-container"></div>
    </div>

    <div id="exam-screen" class="hidden" style="flex-direction: column; height: 100vh;">
        <div id="exam-content" style="flex:1; padding:20px; overflow-y:auto;">
            <div id="questions-container"></div>
            <center>
                <button id="submit-btn" class="btn-start" style="background:var(--success); margin:20px;" onclick="processResults()">Selesai & Analisis</button>
                <div id="result-area" class="hidden">
                    <h2 id="score-display"></h2>
                    <canvas id="scoreChart" width="400" height="400"></canvas>
                    <button class="btn-start" onclick="location.reload()">Selesai</button>
                </div>
            </center>
        </div>
    </div>

    <script>
        let state = { currentUser: '', level: '', year: '', bulan: '', questions: [], answers: [], isDone: false };

        function navTo(id) {
            ['login-screen', 'folder-screen', 'year-screen', 'file-screen', 'exam-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'exam-screen') document.getElementById(id).style.display = 'flex';
        }

        function loginUser() {
            const name = document.getElementById('username-input').value;
            if(!name) return alert("Masukkan nama dulu ya!");
            state.currentUser = name;
            document.getElementById('welcome-msg').innerText = `Halo, ${name}! Pilih level ujianmu:`;
            navTo('folder-screen');
        }

        // Logika penomoran gambar berdasarkan angka awal di teks soal
        function getImagePath(qText) {
            const match = qText.match(/^(\d+)\./);
            if (!match) return null;
            const num = parseInt(match[1]);

            // Mapping gambar sesuai screenshot repository kamu
            if (num >= 19 && num <= 23) return "19-23.png";
            if (num >= 24 && num <= 27) return `${num}.png`;
            if (num >= 28 && num <= 30) return "28-30.png";
            if (num >= 31 && num <= 33) return "31-33.png";
            if (num >= 34 && num <= 37) return "34-37.png";
            if (num >= 38 && num <= 39) return "38-39.png";
            return null;
        }

        async function startQuiz(yr, bulan) {
            state.year = yr; state.bulan = bulan;
            navTo('exam-screen');
            const container = document.getElementById('questions-container');
            container.innerHTML = "Memuat soal...";

            try {
                const res = await fetch(`assets/${state.level}/${yr}/${bulan}.json`);
                const data = await res.json();
                state.questions = data[Object.keys(data)[0]].questions;
                state.answers = new Array(state.questions.length).fill(null);
                
                container.innerHTML = '';
                let isSecondPart = false;

                state.questions.forEach((q, i) => {
                    // Cek jika penomoran mengulang dari 1 (Bagian Bunpou/Dokkai)
                    if (i > 0 && q.q.startsWith("1.")) isSecondPart = true;

                    let imgHtml = '';
                    if (isSecondPart) {
                        const imgName = getImagePath(q.q);
                        if(imgName) {
                            // Path sesuai folder repository: assets/n3/2011/07/gambar.png
                            imgHtml = `<img src="assets/${state.level}/${yr}/${bulan}/${imgName}" class="q-image">`;
                        }
                    }

                    const opts = q.options.map((o, idx) => `
                        <div class="option-item" id="q${i}-o${idx}" onclick="hitOption(${i},${idx})">${idx+1}. ${o}</div>
                    `).join('');

                    container.innerHTML += `<div class="question-card">${imgHtml}<p><b>${q.q}</b></p>${opts}</div>`;
                });
            } catch (e) { container.innerHTML = "Gagal memuat soal. Pastikan file JSON dan folder gambar sudah benar di GitHub."; }
        }

        function hitOption(qIdx, oIdx) {
            if(state.isDone) return;
            state.answers[qIdx] = oIdx;
            document.querySelectorAll(`[id^="q${qIdx}-o"]`).forEach(el => el.classList.remove('selected'));
            document.getElementById(`q${qIdx}-o${oIdx}`).classList.add('selected');
        }

        function processResults() {
            state.isDone = true;
            let correctCount = 0;
            const stats = { KANJI: {c:0, t:0}, GOI: {c:0, t:0}, BUNPOU: {c:0, t:0}, DOKKAI: {c:0, t:0} };

            state.questions.forEach((q, i) => {
                let cat = q.category.split('_')[0]; // Ambil KANJI, GOI, dll
                if(!stats[cat]) stats[cat] = {c:0, t:0};
                stats[cat].t++;

                if(state.answers[i] === q.correct) {
                    correctCount++;
                    stats[cat].c++;
                    document.getElementById(`q${i}-o${q.correct}`).classList.add('correct');
                } else {
                    if(state.answers[i] !== null) document.getElementById(`q${i}-o${state.answers[i]}`).classList.add('wrong');
                    document.getElementById(`q${i}-o${q.correct}`).classList.add('correct');
                }
            });

            saveToHistory(correctCount, stats);
            displayFinalReport(correctCount, stats);
        }

        function saveToHistory(score, stats) {
            let history = JSON.parse(localStorage.getItem(`history_${state.currentUser}`)) || [];
            history.push({ date: new Date().toLocaleDateString(), score: score, total: state.questions.length, stats: stats });
            localStorage.setItem(`history_${state.currentUser}`, JSON.stringify(history));

            if(history.length >= 5) {
                alert(`Evaluasi Danbo: Hai ${state.currentUser}, kamu sudah menyelesaikan 5 ujian! Cek tab evaluasi untuk melihat perkembanganmu.`);
            }
        }

        function displayFinalReport(score, stats) {
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('score-display').innerText = `Skor Akhir: ${score} / ${state.questions.length}`;
            
            // Render Chart
            new Chart(document.getElementById('scoreChart'), {
                type: 'radar',
                data: {
                    labels: ['Kanji', 'Vocabulary', 'Grammar', 'Reading'],
                    datasets: [{
                        label: '% Penguasaan',
                        data: [
                            (stats.KANJI.c/stats.KANJI.t)*100 || 0,
                            (stats.GOI.c/stats.GOI.t)*100 || 0,
                            (stats.BUNPOU.c/stats.BUNPOU.t)*100 || 0,
                            (stats.DOKKAI.c/stats.DOKKAI.t)*100 || 0
                        ],
                        backgroundColor: 'rgba(39, 174, 96, 0.2)', borderColor: '#27ae60'
                    }]
                },
                options: { scales: { r: { min: 0, max: 100 } } }
            });
        }

        // Helper navigasi level (tambahkan level lainnya di sini)
        function selectLevel(lvl) { state.level = lvl; navTo('year-screen'); /* render years... */ }
    </script>
</body>
</html>
