<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Belajar Danbo</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef7ff; color: #333; }
    .home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .folders { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; width: 90%; max-width: 900px; }
    .folder { background: #ffd54f; padding: 40px 20px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 1.2rem; }
    .folder:hover { transform: translateY(-5px); background: #ffca28; }
    .viewer-page { display: none; height: 100vh; grid-template-columns: 300px 1fr; }
    .sidebar { background: #fff8e1; padding: 20px; border-right: 2px solid #ffd54f; overflow-y: auto; }
    .back-btn { padding: 12px; background: #1f3b5b; color: white; border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    .file-item { padding: 15px; background: white; margin-bottom: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #ddd; font-size: 14px; }
    .file-item.active { background: #1f3b5b; color: white; }
    .content-area { background: #f4f4f4; padding: 20px; overflow-y: auto; display: flex; justify-content: center; width: 100%; }
    .quiz-container { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .question { margin-bottom: 35px; padding: 20px; border-bottom: 1px dashed #ccc; }
    .reading-context { margin-bottom: 20px; border: 2px solid #1f3b5b; border-radius: 8px; background: #fff; overflow: hidden; }
    .reading-label { background: #1f3b5b; color: white; padding: 8px 15px; font-size: 13px; font-weight: bold; }
    .quiz-image { width: 100%; height: auto; display: block; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .option-label { padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .btn-selesai { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.1rem; margin-top: 20px; }
    .feedback { display: block; margin-top: 8px; font-weight: bold; }
    .correct { color: #28a745; }
    .wrong { color: #dc3545; }
    @media (max-width: 768px) { .viewer-page { grid-template-columns: 1fr; } .sidebar { max-height: 250px; } }
  </style>
</head>
<body>

  <div id="home" class="home">
    <h1>Portal Belajar Danbo</h1>
    <div class="folders">
      <div class="folder" onclick="openLevel('n1')">JLPT N1</div>
      <div class="folder" onclick="openLevel('n2')">JLPT N2</div>
      <div class="folder" onclick="openLevel('n3')">JLPT N3</div>
    </div>
  </div>

  <div id="viewerPage" class="viewer-page">
    <div class="sidebar">
      <div class="back-btn" onclick="goHome()">← KEMBALI</div>
      <div id="fileList"></div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>

  <script>
    const CONFIG = {
      n1: { jsonUrl: "assets/n1/n1-data.json", imgBase: "assets/n1/2024/12" },
      n2: { jsonUrl: "assets/n2/n2-data.json", imgBase: "assets/n2/2024/12" },
      n3: { jsonUrl: "assets/n3/n3-data.json", imgBase: "assets/n3/2024/12" }
    };

    let fullData = null;
    let currentLvl = '';

    async function openLevel(level) {
      currentLvl = level;
      const cfg = CONFIG[level];
      
      try {
        const response = await fetch(cfg.jsonUrl);
        if (!response.ok) throw new Error("File JSON belum ada di " + cfg.jsonUrl);
        
        fullData = await response.json();
        document.getElementById('home').style.display = 'none';
        document.getElementById('viewerPage').style.display = 'grid';
        renderSidebar();
      } catch (e) {
        alert("Peringatan: " + e.message);
      }
    }

    function renderSidebar() {
      const list = document.getElementById('fileList');
      list.innerHTML = "";
      for (let key in fullData) {
        list.innerHTML += `<div class="file-item" id="item-${key}" onclick="loadQuiz('${key}')">📝 ${fullData[key].title}</div>`;
      }
      const firstKey = Object.keys(fullData)[0];
      if (firstKey) loadQuiz(firstKey);
    }

    function loadQuiz(key) {
      document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`item-${key}`)?.classList.add('active');

      const area = document.getElementById('contentArea');
      const quiz = fullData[key];
      const cfg = CONFIG[currentLvl];
      
      let html = `<div class="quiz-container"><h2>${quiz.title}</h2><form id="fQuiz">`;
      quiz.questions.forEach((q, i) => {
        html += `<div class="question">`;
        if (q.image) {
          html += `<div class="reading-context"><div class="reading-label">GAMBAR SOAL ${i+1}</div><img src="${cfg.imgBase}/${q.image}" class="quiz-image" onerror="this.style.display='none'"></div>`;
        }
        html += `<p><b>${q.q}</b> <span id="res-${i}" class="feedback"></span></p><div class="options">`;
        q.options.forEach((opt, idx) => {
          html += `<label class="option-label"><input type="radio" name="q${i}" value="${idx}"> ${opt}</label>`;
        });
        html += `</div></div>`;
      });
      html += `<button type="button" class="btn-selesai" onclick="checkAll('${key}')">CEK JAWABAN</button></form></div>`;
      area.innerHTML = html;
      area.scrollTop = 0;
    }

    function checkAll(key) {
      fullData[key].questions.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        const fb = document.getElementById(`res-${i}`);
        if (sel) {
          if (parseInt(sel.value) === q.correct) {
            fb.innerHTML = "✅ Benar!"; fb.className = "feedback correct";
          } else {
            fb.innerHTML = `❌ Salah! Kunci: ${q.options[q.correct]}`; fb.className = "feedback wrong";
          }
        } else { fb.innerHTML = "⚠️ Belum dijawab"; fb.className = "feedback wrong"; }
      });
    }

    function goHome() {
      document.getElementById('home').style.display = 'flex';
      document.getElementById('viewerPage').style.display = 'none';
    }
  </script>
</body>
</html>
