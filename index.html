<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Belajar Bahasa Jepang</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eef7ff, #ffffff);
      min-height: 100vh;
      overflow: hidden; /* Mencegah scroll double pada halaman utama */
    }
    
    /* HALAMAN UTAMA */
    .home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      overflow-y: auto;
    }
    h1 {
      color: #1f3b5b;
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.8rem;
    }
    .chopper {
      width: 180px;
      height: auto;
      margin-bottom: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .folders {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: min(800px, 100%);
    }
    .folder {
      background: #ffd54f;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.3s;
    }
    .folder:hover { transform: translateY(-5px); background: #ffca28; }
    .folder h2 { margin: 0; color: #5d4300; font-size: 1.2rem; }

    /* HALAMAN VIEWER */
    .viewer-page {
      display: none;
      height: 100vh;
      grid-template-columns: 300px 1fr;
    }
    .sidebar {
      background: #fff8e1;
      padding: 20px;
      overflow-y: auto;
      border-right: 2px solid #ffd54f;
      display: flex;
      flex-direction: column;
    }
    .back-btn {
      padding: 10px;
      background: #1f3b5b;
      color: white;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .sidebar h2 {
      font-size: 1.1rem;
      color: #5d4300;
      border-bottom: 2px solid #ffd54f;
      padding-bottom: 10px;
      margin-top: 0;
    }
    .file-list {
      flex-grow: 1;
    }
    .file-item {
      padding: 12px;
      background: white;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      border: 1px solid #eee;
      transition: 0.2s;
    }
    .file-item:hover { background: #fff3cd; }
    .file-item.active {
      background: #1f3b5b;
      color: white;
      font-weight: bold;
    }
    .pdf-container {
      background: #525659;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pdf-viewer {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* RESPONSIVE MOBILE */
    @media (max-width: 768px) {
      .viewer-page {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .sidebar {
        height: auto;
        max-height: 250px;
        border-right: none;
        border-bottom: 2px solid #ffd54f;
        padding: 15px;
      }
      .file-list {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding-bottom: 5px;
      }
      .file-item {
        flex: 0 0 auto;
        margin-bottom: 0;
        white-space: nowrap;
      }
      .pdf-container {
        height: calc(100vh - 250px);
      }
    }
  </style>
</head>
<body>

  <div id="home" class="home">
    <h1>Portal Belajar Bahasa Jepang</h1>
    <img class="chopper" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExdzYzbnNwMDBhdTVlYmJwaWN3cWNpbGt0dXl2bmxub2s1ZWtucDliYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3nYPJOsVt5RYnpPv3o/giphy.gif" alt="Chopper">
    
    <div class="folders">
      <div class="folder" onclick="openLevel('n1')"><h2>JLPT N1</h2></div>
      <div class="folder" onclick="openLevel('n2')"><h2>JLPT N2</h2></div>
      <div class="folder" onclick="openLevel('n3')"><h2>JLPT N3</h2></div>
    </div>
  </div>

  <div id="viewerPage" class="viewer-page">
    <div class="sidebar">
      <div class="back-btn" onclick="goHome()">← Kembali</div>
      <h2 id="levelTitle">Materi</h2>
      <div id="fileList" class="file-list"></div>
    </div>
    <div class="pdf-container">
      <iframe id="pdfViewer" class="pdf-viewer"></iframe>
    </div>
  </div>

  <script>
    // SESUAIKAN: Ganti dengan username GitHub kamu yang benar
    const GH_USER = "mh7714240-jpg";
    const GH_REPO = "aries.github.io";

    // Daftar file yang ada di folder assets/n1/
    const files = {
      n1: [
        'jlpt-n1-2024-12.pdf',
        'jlpt-n1-2024-07.pdf',
        'jlpt-n1-2023-12.pdf',
        'jlpt-n1-2023-07.pdf',
        'jlpt-n1-2022-12.pdf'
      ],
      n2: [],
      n3: []
    };

    function openLevel(level) {
      document.getElementById('home').style.display = 'none';
      document.getElementById('viewerPage').style.display = 'grid';
      document.getElementById('levelTitle').textContent = 'Daftar ' + level.toUpperCase();

      const listDiv = document.getElementById('fileList');
      listDiv.innerHTML = '';

      if (files[level].length === 0) {
        listDiv.innerHTML = '<p>Belum ada file.</p>';
        return;
      }

      files[level].forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.textContent = file;
        item.onclick = function() { loadPDF(level, file, this); };
        listDiv.appendChild(item);

        // Load file pertama secara otomatis saat folder dibuka
        if (index === 0) loadPDF(level, file, item);
      });
    }

    function loadPDF(level, fileName, element) {
      // Tandai file yang sedang aktif (warna biru)
      const allItems = document.querySelectorAll('.file-item');
      allItems.forEach(i => i.classList.remove('active'));
      element.classList.add('active');

      // Buat URL Absolut ke file di GitHub
      const fileUrl = `https://${GH_USER}.github.io/${GH_REPO}/assets/${level}/${fileName}`;
      
      // Gunakan Google Docs Viewer agar bisa tampil di HP tanpa tab baru
      const finalUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(fileUrl)}&embedded=true`;
      
      document.getElementById('pdfViewer').src = finalUrl;
    }

    function goHome() {
      document.getElementById('viewerPage').style.display = 'none';
      document.getElementById('home').style.display = 'flex';
      document.getElementById('pdfViewer').src = '';
    }
  </script>
</body>
</html>
