<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Belajar Danbo - N1</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef7ff; color: #333; }
    
    /* Home Screen */
    .home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .folders { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 80%; max-width: 800px; }
    .folder { background: #ffd54f; padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .folder:hover { transform: translateY(-5px); background: #ffca28; }

    /* Layout Viewer */
    .viewer-page { display: none; height: 100vh; grid-template-columns: 300px 1fr; }
    .sidebar { background: #fff8e1; padding: 20px; border-right: 2px solid #ffd54f; overflow-y: auto; }
    .back-btn { padding: 12px; background: #1f3b5b; color: white; border-radius: 8px; text-align: center; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    
    .file-item { padding: 15px; background: white; margin-bottom: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #ddd; display: flex; align-items: center; gap: 10px; }
    .file-item.active { background: #1f3b5b; color: white; border-color: #1f3b5b; }

    .content-area { background: #f4f4f4; padding: 20px; overflow-y: auto; display: flex; justify-content: center; }
    
    /* Quiz Components */
    .quiz-container { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .question { margin-bottom: 30px; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 10px; }
    .question p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 15px; }
    
    /* Image Context Styling */
    .reading-context { margin-bottom: 25px; border: 2px solid #1f3b5b; border-radius: 8px; overflow: hidden; }
    .reading-label { background: #1f3b5b; color: white; padding: 8px 15px; font-size: 13px; font-weight: bold; }
    .quiz-image { width: 100%; display: block; height: auto; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .option-label { padding: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
    .option-label:hover { background: #f0f7ff; }
    
    .btn-selesai { background: #28a745; color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.2rem; margin-top: 20px; }
    .feedback { font-weight: bold; margin-top: 10px; display: block; }
    .correct { color: #28a745; }
    .wrong { color: #dc3545; }

    @media (max-width: 768px) {
      .viewer-page { grid-template-columns: 1fr; }
      .sidebar { max-height: 250px; }
      .options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="home" class="home">
    <h1 style="margin-bottom: 40px;">Portal Belajar Danbo</h1>
    <div class="folders">
      <div class="folder" onclick="openLevel('n1')">JLPT N1</div>
      <div class="folder" onclick="openLevel('n2')">JLPT N2</div>
      <div class="folder" onclick="openLevel('n3')">JLPT N3</div>
    </div>
  </div>

  <div id="viewerPage" class="viewer-page">
    <div class="sidebar">
      <div class="back-btn" onclick="goHome()">← KEMBALI</div>
      <div id="fileList"></div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>

  <script>
    const contentData = {
      n1: [{ type: 'quiz', id: 'tes-2024-12', title: 'Tes N1 Des 2024', icon: '📝' }],
      n2: [], n3: []
    };

    let fullDataJSON = null;
    let currentLevel = '';

    async function openLevel(level) {
      currentLevel = level;
      document.getElementById('home').style.display = 'none';
      document.getElementById('viewerPage').style.display = 'grid';
      
      try {
        const response = await fetch(`assets/${level}/${level}-data.json`);
        if (!response.ok) throw new Error();
        fullDataJSON = await response.json();
        renderSidebar(level);
      } catch (e) {
        document.getElementById('fileList').innerHTML = '<p style="color:red">Gagal memuat data JSON.</p>';
      }
    }

    function renderSidebar(level) {
      const listDiv = document.getElementById('fileList');
      listDiv.innerHTML = '';
      contentData[level].forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `${item.icon} ${item.title}`;
        div.onclick = () => displayQuiz(item.id, div);
        listDiv.appendChild(div);
        if(index === 0) div.click();
      });
    }

    function displayQuiz(quizId, element) {
      setActive(element);
      const area = document.getElementById('contentArea');
      const data = fullDataJSON[quizId];
      
      let html = `<div class="quiz-container"><h2>${data.title}</h2><form id="quizForm">`;
      
      data.questions.forEach((q, i) => {
        html += `<div class="question">`;
        
        // Logika Gambar Tengah: Muncul jika ada properti "image" di nomor ini
        if (q.image) {
          html += `<div class="reading-context">
                     <div class="reading-label">BACAAN UNTUK NOMOR ${i + 1} - 45</div>
                     <img src="assets/${currentLevel}/2024/12/${q.image}" class="quiz-image">
                   </div>`;
        }

        html += `<p><b>${q.q}</b> <span id="f-${i}" class="feedback"></span></p>
                 <div class="options">`;
        
        q.options.forEach((opt, idx) => {
          html += `<label class="option-label">
                     <input type="radio" name="q${i}" value="${idx}"> ${opt}
                   </label>`;
        });
        
        html += `</div></div>`;
      });
      
      html += `<button type="button" class="btn-selesai" onclick="checkAnswers('${quizId}')">CEK JAWABAN</button></form></div>`;
      area.innerHTML = html;
      area.scrollTop = 0;
    }

    function checkAnswers(quizId) {
      const questions = fullDataJSON[quizId].questions;
      questions.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const fb = document.getElementById(`f-${i}`);
        if(selected && parseInt(selected.value) === q.correct) {
          fb.innerHTML = "✅ Benar!"; fb.className = "feedback correct";
        } else {
          fb.innerHTML = `❌ Salah! (Jawaban: ${q.options[q.correct]})`; fb.className = "feedback wrong";
        }
      });
    }

    function setActive(el) {
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }

    function goHome() {
      document.getElementById('home').style.display = 'flex';
      document.getElementById('viewerPage').style.display = 'none';
    }
  </script>
</body>
</html>
